<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%" preserveAspectRatio="none">
  <!-- Decorative background wave simulating SulAmerica branding -->
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066FF" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#1D2E5D" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="waveOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F68B2C" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#F68B2C" stop-opacity="0" />
    </linearGradient>
  </defs>
  
  <path d="M 800 0 L 800 600 L 200 600 Q 400 400 300 200 T 500 0 Z" fill="url(#waveGrad)" />
  <path d="M 800 600 L 300 600 Q 500 500 600 300 T 800 100 Z" fill="url(#waveOrange)" />
</svg>
